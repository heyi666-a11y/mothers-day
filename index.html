<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>给妈妈</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a12;min-height:100vh;overflow:hidden;font-family:'Georgia','PingFang SC','Microsoft YaHei',serif;}
.stage{width:100%;height:100vh;max-width:420px;margin:0 auto;position:relative;overflow:hidden;}

.scene{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;justify-content:center;align-items:center;padding:24px;}
.scene.active{display:flex;animation:fadeRise .7s ease-out forwards;}
.scene.out{display:flex!important;animation:slideAway .5s ease-in forwards;}
@keyframes fadeRise{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideAway{from{transform:translateX(0);opacity:1}to{transform:translateX(-100%);opacity:0}}

.dots{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:9999;}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);transition:.3s;}
.dot.active{background:#ff8c94;box-shadow:0 0 10px #ff8c94;}

/* ===== 场景0：生日烛 ===== */
.scene-0{background:linear-gradient(180deg,#1a0a0a,#0d0d1a);}
.scene-0 .sub{color:rgba(255,200,150,.3);font-size:12px;letter-spacing:3px;margin-bottom:20px;}
.candle-area{position:relative;width:150px;height:240px;}
.candle-body{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:44px;height:130px;background:linear-gradient(180deg,#f5d6c6,#e0b89a);border-radius:4px 4px 3px 3px;}
.candle-wick{position:absolute;bottom:105px;left:50%;transform:translateX(-50%);width:2px;height:16px;background:#555;}
.flame{position:absolute;bottom:117px;left:50%;transform:translateX(-50%);width:18px;height:28px;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;background:radial-gradient(ellipse,#fff7a0,#ff8c00);box-shadow:0 0 30px #ff8c00,0 0 60px #ff4500;transition:all .15s ease;}
.flame.flicker{animation:flicker .12s ease-in-out infinite alternate;}
@keyframes flicker{from{transform:translateX(-50%) scaleX(1) scaleY(1)}to{transform:translateX(-50%) scaleX(.85) scaleY(1.15)}}
.flame.dying{transform:translateX(-50%) scaleY(.4);opacity:.3;box-shadow:0 0 5px #ff8c00;}
.flame.gone{transform:translateX(-50%) scaleY(0);opacity:0;box-shadow:none;}
.blow-hint{color:rgba(255,200,150,.5);font-size:14px;margin-top:30px;letter-spacing:2px;animation:pulseText 2s ease-in-out infinite;}
@keyframes pulseText{0%,100%{opacity:.4}50%{opacity:.8}}
.blow-progress{width:180px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;margin-top:16px;overflow:hidden;}
.blow-fill{height:100%;width:0%;background:linear-gradient(90deg,#ff8c00,#ffd700);border-radius:2px;transition:width .1s linear;}

/* ===== 场景1：妈妈的味道 ===== */
.scene-1{background:linear-gradient(180deg,#1a1a2e,#2d1b2e,#1a1a2e);}
.scene-1 .sub{color:rgba(220,180,140,.45);font-size:14px;margin-bottom:14px;}
.food-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:280px;}
.food-tile{aspect-ratio:1;background:rgba(60,40,35,.4);border-radius:12px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;transition:all .6s ease;border:1px solid rgba(255,255,255,.05);position:relative;overflow:hidden;}
.food-tile::before{content:'?';font-size:22px;color:rgba(255,255,255,.1);transition:.3s;}
.food-tile .food-icon{display:none;font-size:36px;}
.food-tile .food-label{display:none;font-size:11px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:1px;}
.food-tile.revealed{background:rgba(80,60,40,.5);border-color:rgba(255,200,150,.15);box-shadow:0 0 20px rgba(255,200,150,.06);}
.food-tile.revealed::before{display:none;}
.food-tile.revealed .food-icon{display:block;animation:fadeScale .5s ease;}
.food-tile.revealed .food-label{display:block;}
@keyframes fadeScale{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.food-hint{color:rgba(220,180,140,.3);font-size:13px;margin-top:16px;}

/* ===== 场景2：妈妈的话 ===== */
.scene-2{background:linear-gradient(180deg,#1a1a2a,#2a1a2a,#1a1a2a);}
.scene-2 .sub{color:rgba(200,200,220,.35);font-size:14px;margin-bottom:12px;}
.saying-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:290px;}
.saying-tile{aspect-ratio:1;background:rgba(50,40,55,.4);border-radius:10px;cursor:pointer;transition:all .7s ease;border:1px solid rgba(255,255,255,.04);display:flex;justify-content:center;align-items:center;padding:8px;text-align:center;font-size:0;color:rgba(255,255,255,.65);line-height:1.5;}
.saying-tile::before{content:'♨';font-size:18px;color:rgba(255,255,255,.08);}
.saying-tile.revealed{background:rgba(70,50,70,.5);border-color:rgba(255,200,200,.08);box-shadow:0 0 10px rgba(255,200,200,.04);font-size:14px;letter-spacing:1px;}
.saying-tile.revealed::before{display:none;}
.saying-hint{color:rgba(200,200,220,.25);font-size:13px;margin-top:14px;}

/* ===== 场景3：小时候 ===== */
.scene-3{background:linear-gradient(135deg,#2c1810,#1a1a2e,#2c1810);}
.scene-3 .sub{color:rgba(220,200,180,.35);font-size:14px;margin-bottom:12px;}
.child-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:280px;}
.child-tile{aspect-ratio:1;background:linear-gradient(145deg,#3a2520,#2a1a15);border-radius:14px;display:flex;justify-content:center;align-items:center;font-size:36px;cursor:pointer;transition:all .5s cubic-bezier(.34,1.56,.64,1);border:1px solid rgba(255,255,255,.05);position:relative;overflow:hidden;}
.child-tile::before{content:'❄';font-size:24px;opacity:.15;}
.child-tile.revealed{background:linear-gradient(145deg,#3a2a2a,#2a1a20);transform:rotateY(360deg);border-color:rgba(200,180,150,.1);box-shadow:0 0 12px rgba(200,180,150,.06);}
.child-tile.revealed::before{display:none;}
.child-tile.revealed .child-icon{display:block;}
.child-tile .child-icon{display:none;font-size:38px;animation:popIn .4s ease;}
.child-tile .child-label{position:absolute;bottom:6px;font-size:10px;color:rgba(255,255,255,.35);display:none;}
.child-tile.revealed .child-label{display:block;}
@keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
.child-prog{color:rgba(255,255,255,.2);font-size:12px;margin-top:16px;}

/* ===== 场景4：音乐盒 ===== */
.scene-4{background:linear-gradient(180deg,#1a0a1a,#2a102a,#1a0a2a);}
.scene-4 .sub{color:rgba(200,180,220,.35);font-size:14px;margin-bottom:10px;}
.music-box{position:relative;width:280px;height:200px;}
.box-lid{position:absolute;top:0;left:0;width:100%;height:45px;background:linear-gradient(135deg,#5a3a1a,#7a4a2a);border-radius:8px 8px 0 0;transform-origin:bottom;transition:transform .8s ease;border:2px solid #5a3a1a;}
.box-lid.open{transform:rotateX(-55deg);}
.box-body{position:absolute;bottom:0;left:0;width:100%;height:160px;background:linear-gradient(135deg,#5a3a1a,#7a4a2a,#4a2a0a);border-radius:0 0 8px 8px;border:2px solid #5a3a1a;}
.box-key{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:150px;height:80px;display:none;flex-wrap:wrap;justify-content:center;gap:5px;align-items:center;}
.box-key.show{display:flex;}
.note-key{border:none;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer;transition:.2s;border:2px solid transparent;}
.note-key:active{transform:scale(.85);}
.note-key.correct{border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,.4);transform:scale(1.12);}
.music-score{color:rgba(255,255,255,.25);font-size:12px;margin-top:14px;letter-spacing:2px;}

/* ===== 场景5：许愿灯 ===== */
.scene-5{background:linear-gradient(180deg,#0a0a1a,#1a0a2a,#0a0a1a);}
.scene-5 .sub{color:rgba(200,180,220,.3);font-size:14px;margin-bottom:10px;}
.lantern-wrap{position:relative;width:180px;height:240px;cursor:pointer;}
.lantern-body{width:140px;height:160px;margin:0 auto;background:radial-gradient(ellipse at 50% 60%,rgba(255,100,50,.7),rgba(200,50,30,.5));border-radius:70px 70px 50px 50px;position:relative;box-shadow:0 0 60px rgba(255,100,50,.25),0 0 120px rgba(200,50,30,.1);transition:.5s;animation:lanternGlow 2s ease-in-out infinite alternate;}
@keyframes lanternGlow{from{box-shadow:0 0 50px rgba(255,100,50,.2)}to{box-shadow:0 0 80px rgba(255,100,50,.4),0 0 160px rgba(200,50,30,.15)}}
.lantern-top{width:70px;height:10px;background:#5a3a1a;margin:0 auto;border-radius:3px 3px 0 0;}
.lantern-line{width:2px;height:35px;background:#5a3a1a;margin:0 auto;}
.lantern-tassel{width:26px;height:6px;background:#7a4a2a;margin:8px auto 0;border-radius:0 0 3px 3px;}
.wish-input-wrap{width:280px;margin-top:20px;}
.wish-input{width:100%;padding:12px 16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:rgba(255,255,255,.7);font-size:14px;text-align:center;outline:none;transition:.3s;}
.wish-input::placeholder{color:rgba(255,255,255,.3);}
.wish-input:focus{border-color:rgba(255,200,150,.4);background:rgba(255,255,255,.12);}
.float-btn{margin-top:16px;padding:10px 28px;background:rgba(255,100,50,.25);border:1px solid rgba(255,100,50,.4);border-radius:20px;color:rgba(255,200,150,.8);font-size:14px;cursor:pointer;transition:.3s;}
.float-btn:disabled{opacity:.3;cursor:not-allowed;}
.lantern-hint{color:rgba(200,180,220,.25);font-size:13px;margin-top:16px;}
.wish-cloud{position:absolute;font-size:15px;color:rgba(255,200,150,.8);opacity:0;transition:all 2s ease;pointer-events:none;letter-spacing:2px;text-shadow:0 0 20px rgba(255,200,150,.5);}
.wish-cloud.show{opacity:1;transform:translateY(-120px);}

/* ===== 场景6：终章 ===== */
.scene-6{background:linear-gradient(135deg,#1a0a2a,#2a1040,#1a0a2a);overflow:hidden;}
.scene-6 .sub{color:rgba(200,180,220,.25);font-size:12px;margin-bottom:8px;}
.final-heart{font-size:70px;animation:finalFloat 2s ease-in-out infinite;margin-bottom:8px;opacity:0;transition:1.5s;}
.final-heart.show{opacity:1;}
@keyframes finalFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.final-title{font-size:34px;color:#fff;text-shadow:0 0 40px #ff8c94;opacity:0;transform:scale(.5);transition:1.5s cubic-bezier(.34,1.56,.64,1);}
.final-title.show{opacity:1;transform:scale(1);}
.final-lines{margin-top:16px;color:rgba(255,255,255,.6);font-size:16px;text-align:center;line-height:2.2;opacity:0;transition:2s;transition-delay:.5s;}
.final-lines.show{opacity:1;}
.final-again{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:10px 26px;color:rgba(255,255,255,.35);font-size:13px;margin-top:26px;cursor:pointer;transition:.3s;opacity:0;}
.final-again.show{opacity:1;}
.final-again:active{background:rgba(255,255,255,.1);}
.final-petals{position:absolute;pointer-events:none;top:0;left:0;width:100%;height:100%;overflow:hidden;}

.next-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:7px 18px;color:rgba(255,255,255,.3);font-size:11px;margin-top:16px;cursor:pointer;transition:.3s;letter-spacing:2px;}
.next-btn:active{background:rgba(255,255,255,.08);}
.next-btn.hidden{display:none;}

.bg-stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;}
.bg-star{position:absolute;width:2px;height:2px;border-radius:50%;background:#fff;animation:twinkle 3s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.15}50%{opacity:.6}}
</style>
</head>
<body>

<div class="bg-stars" id="bgStars"></div>
<div class="dots" id="dots"></div>

<div class="stage">

<!-- 场景0：生日烛 -->
<div class="scene scene-0 active" id="s0">
  <div class="sub">✨ 给妈妈 ✨</div>
  <div class="candle-area" id="candleArea">
    <div class="candle-body"></div>
    <div class="candle-wick"></div>
    <div class="flame flicker" id="flame"></div>
  </div>
  <div class="blow-hint" id="blowHint">吹熄蜡烛，开始吧</div>
  <div class="blow-progress"><div class="blow-fill" id="blowFill"></div></div>
  <button class="next-btn hidden" id="next0" onclick="goScene(1)">→</button>
</div>

<!-- 场景1：妈妈的味道 -->
<div class="scene scene-1" id="s1">
  <div class="sub">🍲 妈妈的味道</div>
  <div class="food-grid" id="foodGrid"></div>
  <div class="food-hint" id="foodHint">点击翻开妈妈常做的菜</div>
  <button class="next-btn hidden" id="next1" onclick="goScene(2)">→</button>
</div>

<!-- 场景2：妈妈的话 -->
<div class="scene scene-2" id="s2">
  <div class="sub">♨ 妈妈的话</div>
  <div class="saying-grid" id="sayingGrid"></div>
  <div class="saying-hint" id="sayingHint">点击翻开妈妈说过的那些话</div>
  <button class="next-btn hidden" id="next2" onclick="goScene(3)">→</button>
</div>

<!-- 场景3：小时候 -->
<div class="scene scene-3" id="s3">
  <div class="sub">⛵ 小时候</div>
  <div class="child-grid" id="childGrid"></div>
  <div class="child-prog" id="childProg">翻开童年的记忆 0/9</div>
  <button class="next-btn hidden" id="next3" onclick="goScene(4)">→</button>
</div>

<!-- 场景4：音乐盒 -->
<div class="scene scene-4" id="s4">
  <div class="sub">🎵 小时候的歌</div>
  <div class="music-box" id="musicBox">
    <div class="box-lid" id="boxLid"></div>
    <div class="box-body"></div>
    <div class="box-key" id="boxKey"></div>
  </div>
  <div class="music-score" id="musicScore">✨ ...</div>
  <button class="next-btn hidden" id="next4" onclick="goScene(5)">→</button>
</div>

<!-- 场景5：许愿灯 -->
<div class="scene scene-5" id="s5">
  <div class="sub">🏮 愿</div>
  <div class="lantern-wrap" id="lanternWrap">
    <div class="lantern-line"></div>
    <div class="lantern-top"></div>
    <div class="lantern-body" id="lanternBody"></div>
    <div class="lantern-tassel"></div>
  </div>
  <div class="wish-input-wrap">
    <input type="text" class="wish-input" id="wishInput" placeholder="写下你的愿望..." maxlength="20">
  </div>
  <button class="float-btn" id="floatBtn" onclick="floatLantern()">放飞</button>
  <div class="lantern-hint" id="lanternHint">写下愿望，点击放飞</div>
  <button class="next-btn hidden" id="next5" onclick="goScene(6)">→</button>
</div>

<!-- 场景6 -->
<div class="scene scene-6" id="s6">
  <div class="final-heart" id="finalHeart">💖</div>
  <div class="final-title" id="finalTitle">辛苦了，妈妈</div>
  <div class="final-lines" id="finalLines">
    你说过的话<br>
    我都记在心里<br><br>
    ✨
  </div>
  <div class="final-petals" id="finalPetals"></div>
  <button class="final-again" id="finalAgain" onclick="restartJourney()">↺ 再走一遍</button>
</div>

</div>

<script>
// ===== 背景星星 =====
(function(){
  const c=document.getElementById('bgStars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');s.className='bg-star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.animationDelay=Math.random()*4+'s';s.style.animationDuration=(2+Math.random()*4)+'s';
    s.style.width=s.style.height=(1+Math.random()*2)+'px';
    c.appendChild(s);
  }
})();

// ===== 音效系统 =====
const SFX={
  ctx:null,muted:false,
  init(){
    try{
      this.ctx=new(window.AudioContext||window.webkitAudioContext)();
      if(this.ctx.state==='suspended')this.ctx.resume();
    }catch(e){}
  },
  ensure(){
    if(!this.ctx){this.init();return false;}
    if(this.ctx.state==='suspended')this.ctx.resume();
    return true;
  },
  t(f,d,ty='sine',v=.35){
    if(!this.ensure()||this.muted)return;
    try{
      const o=this.ctx.createOscillator(),g=this.ctx.createGain();
      o.connect(g);g.connect(this.ctx.destination);
      o.frequency.value=f;o.type=ty;
      g.gain.setValueAtTime(v,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+d);
      o.start();o.stop(this.ctx.currentTime+d);
    }catch(e){}
  },
  noise(dur,vol=.2){
    if(!this.ensure()||this.muted)return;
    try{
      const len=this.ctx.sampleRate*dur;
      const buf=this.ctx.createBuffer(1,len,this.ctx.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(this.ctx.sampleRate*dur*.3));
      const s=this.ctx.createBufferSource(),g=this.ctx.createGain();
      s.buffer=buf;s.connect(g);g.connect(this.ctx.destination);
      g.gain.setValueAtTime(vol,this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+dur);
      s.start();
    }catch(e){}
  },
  blow(){this.noise(.4,.2);},
  reveal(){this.t(660,.12,'sine',.2);setTimeout(()=>this.t(880,.15,'sine',.15),60)},
  flip(){this.t(400,.08,'sine',.18);setTimeout(()=>this.t(600,.1,'sine',.12),60)},
  note(f){this.t(f,.35,'sine',.22)},
  lantern(){this.t(500,.25,'sine',.18);setTimeout(()=>this.t(700,.35,'sine',.12),150)},
  chime(){const n=[880,1100,1320];n.forEach((f,i)=>setTimeout(()=>this.t(f,.5,'sine',.12),i*150))},
  complete(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.t(f,.35,'sine',.18),i*120))},
  pageTurn(){this.t(500,.08,'triangle',.06);setTimeout(()=>this.t(700,.1,'triangle',.05),50)},
  melody(){
    const m=[{f:523,d:.4},{f:587,d:.4},{f:659,d:.4},{f:523,d:.4},{f:659,d:.4},{f:698,d:.4},{f:784,d:.8}];
    let t=0;m.forEach(n=>{setTimeout(()=>{if(!this.muted)this.t(n.f,n.d,'sine',.1)},t*1000);t+=n.d+.1})
  }
};

let audioStarted=false;
document.addEventListener('click',()=>{
  if(!audioStarted){audioStarted=true;SFX.init();}
},{once:true});
document.addEventListener('touchstart',()=>{
  if(!audioStarted){audioStarted=true;SFX.init();}
},{once:true});

// ===== 页面系统 =====
let curScene=0;
function dots(){
  const c=document.getElementById('dots');c.innerHTML='';
  for(let i=0;i<7;i++){const d=document.createElement('div');d.className='dot'+(i===0?' active':'');c.appendChild(d)}
}
function updDots(){document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===curScene))}
function goScene(n){
  if(n<0||n>6)return;
  SFX.ensure();SFX.pageTurn();
  document.getElementById('s'+curScene).classList.remove('active');
  document.getElementById('s'+curScene).classList.add('out');
  setTimeout(()=>{
    document.querySelectorAll('.scene').forEach(s=>s.classList.remove('out'));
    document.getElementById('s'+n).classList.add('active');
    curScene=n;updDots();
    if(n===1)initFood();
    if(n===2)initSayings();
    if(n===3)initChildhood();
    if(n===4)initMusicBox();
    if(n===5)initLantern();
  },300);
}

// ===== 场景0：吹蜡烛 =====
let blowVal=0,blowing=false;
(function(){
  const flame=document.getElementById('flame');
  const area=document.getElementById('candleArea');
  area.addEventListener('touchstart',(e)=>{e.preventDefault();blowing=true;startBlow()});
  area.addEventListener('touchend',()=>{blowing=false;stopBlow()});
  area.addEventListener('mousedown',()=>{blowing=true;startBlow()});
  area.addEventListener('mouseup',()=>{blowing=false;stopBlow()});
  area.addEventListener('mouseleave',()=>{blowing=false;stopBlow()});
  function startBlow(){
    if(blowVal>=100)return;
    SFX.blow();
    flame.classList.remove('flicker');
    const iv=setInterval(()=>{
      if(!blowing||blowVal>=100){clearInterval(iv);return;}
      blowVal=Math.min(100,blowVal+2.5);
      document.getElementById('blowFill').style.width=blowVal+'%';
      flame.classList.add('dying');
      if(blowVal>40)flame.style.transform='translateX(-50%) scaleY('+Math.max(0,.45-blowVal/200)+')';
      if(blowVal>=100){
        clearInterval(iv);
        flame.classList.remove('dying');flame.classList.add('gone');
        document.getElementById('blowHint').textContent='✨';
        document.getElementById('next0').classList.remove('hidden');
        SFX.chime();
      }
    },80);
  }

// ===== 场景4：音乐盒 =====
const melodyNotes=[
  {note:'c',freq:523},{note:'c',freq:523},{note:'g',freq:784},{note:'g',freq:784},
  {note:'a',freq:880},{note:'a',freq:880},{note:'g',freq:784}
];
let melodyIdx=0,boxOpened=false;
function initMusicBox(){
  document.getElementById('boxLid').classList.remove('open');
  document.getElementById('boxKey').classList.remove('show');
  melodyIdx=0;boxOpened=false;
  document.getElementById('musicScore').textContent='✨ ...';
  document.getElementById('next4').classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('boxLid').classList.add('open');
    SFX.t(400,.3,'sine',.08);
    setTimeout(()=>{
      document.getElementById('boxKey').classList.add('show');
      document.getElementById('musicScore').textContent='🎵 按顺序弹';
      boxOpened=true;
    },600);
  },400);
  const notes=['c','d','e','f','g','a'];
  const k=document.getElementById('boxKey');k.innerHTML='';
  notes.forEach(n=>{
    const b=document.createElement('button');b.className='note-key';
    b.dataset.note=n;b.textContent=n.toUpperCase();
    const map={c:'#ff6b9d',d:'#ffa07a',e:'#ffd700',f:'#90ee90',g:'#87ceeb',a:'#dda0dd'};
    b.style.background=map[n]||'#fff';
    b.addEventListener('click',()=>hitNote(n,b));
    k.appendChild(b);
  });
}
function hitNote(note,el){
  if(!boxOpened)return;
  if(note===melodyNotes[melodyIdx].note){
    SFX.note(melodyNotes[melodyIdx].freq);
    el.classList.add('correct');
    setTimeout(()=>el.classList.remove('correct'),300);
    melodyIdx++;
    document.getElementById('musicScore').textContent='✨ '+'⭐'.repeat(melodyIdx)+'☆'.repeat(7-melodyIdx);
    if(melodyIdx===7){
      document.getElementById('musicScore').textContent='✨ 送给你';
      document.getElementById('next4').classList.remove('hidden');
      SFX.chime();
      setTimeout(()=>SFX.melody(),500);
    }
  } else {
    el.style.transform='scale(.8)';el.style.opacity='.5';
    setTimeout(()=>{el.style.transform='';el.style.opacity='1'},200);
  }
}

}
